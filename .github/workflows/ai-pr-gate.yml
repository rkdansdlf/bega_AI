name: ai-pr-gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'app/**'
      - 'contracts/**'
      - 'scripts/**'
      - 'tests/**'
      - 'main.py'
      - 'requirements.txt'
      - 'requirements-dev'
      - 'Dockerfile'
      - 'Dockerfile.free_threaded'
      - 'pytest.ini'
      - '.github/workflows/ai-pr-gate.yml'

concurrency:
  group: ai-pr-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ai-pr-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev

      - name: Run AI PR gate tests
        env:
          PYTHONPATH: .
          POSTGRES_DB_URL: postgresql://localhost:5432/postgres
        run: |
          python -m pytest \
            tests/test_ai_optimization_ops_scripts.py \
            tests/test_baseball_agent_llm_planner.py \
            tests/test_benchmark_retrieval.py \
            tests/test_chat_api_smoke.py \
            tests/test_chat_cost_metrics.py \
            tests/test_chat_model_routing_experiment.py \
            tests/test_chat_model_usage.py \
            tests/test_chat_quality_golden_dataset.py \
            tests/test_coach.py \
            tests/test_coach_dual.py \
            tests/test_coach_router_year_resolution.py \
            tests/test_pooled_connection.py \
            tests/test_rag_caching.py \
            tests/test_semantic_cache_shadow_eval.py \
            -q
